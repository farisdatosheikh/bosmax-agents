# BOSMAX Video Single-Block Notion Templates
# Surface: operator-facing plug-and-play template inputs
# Scope: single-block only (duration fits within engine max per block)
# Authority: docs/prompt_template_readiness_contract_v1.md
#
# FORBIDDEN in these templates:
#   - hook / USP 1-3 / CTA fields (resolved internally by resolver_runtime)
#   - registry_writeback for registered product workflows
#   - avatar pool cross-contamination (STEALTH ↔ DIRECT)
#
# Each template declares expected_route_status for validator reference.

templates:

