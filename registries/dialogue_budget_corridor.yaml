version: 1
description: >
  Repo-level dialogue budget corridor for BOSMAX commercial spoken lanes.
  This registry exists to prevent both underfilled dialogue and overfilled dialogue.
guidance:
  underfill_actions:
    - expand_dialogue
    - reduce_duration
    - add_intentional_visual_proof_beats
  status_logic:
    UNDERFILLED: final_word_count < minimum_words
    TARGET_RANGE: target_min_words <= final_word_count <= target_max_words
    OVER_SAFE: target_max_words < final_word_count <= safe_max_words
    HARD_FAIL: final_word_count > safe_max_words
corridors:
  - language: BM
    pace_class: BRISK_UGC
    duration_seconds: 6
    minimum_words: 14
    target_min_words: 15
    target_max_words: 16
    safe_max_words: 17
    hard_ceiling_words: 18
    underfill_risk: Empty visual time opens space for filler motion and weak sell-through.
    overfill_risk: Spoken compression starts to sound rushed and unnatural.
  - language: BM
    pace_class: BRISK_UGC
    duration_seconds: 7
    minimum_words: 17
    target_min_words: 18
    target_max_words: 19
    safe_max_words: 20
    hard_ceiling_words: 21
    underfill_risk: VEO_3_1_LITE renders approximately 7s per 8s API block; underfilling the spoken arc leaves dead air in the actual render window.
    overfill_risk: Overpacking beyond 21 words for a 7s actual render compresses lip sync and breaks natural UGC cadence.
  - language: BM
    pace_class: BRISK_UGC
    duration_seconds: 8
    minimum_words: 19
    target_min_words: 20
    target_max_words: 21
    safe_max_words: 22
    hard_ceiling_words: 24
    underfill_risk: Early silence weakens the product turn and proof beat density.
    overfill_risk: Too many clauses start colliding with gestures and lip sync.
  - language: BM
    pace_class: BRISK_UGC
    duration_seconds: 10
    minimum_words: 24
    target_min_words: 26
    target_max_words: 28
    safe_max_words: 28
    hard_ceiling_words: 30
    underfill_risk: Product reveal feels unsupported and invites hallucinated filler action.
    overfill_risk: Voice pacing drifts out of believable UGC rhythm.
  - language: BM
    pace_class: BRISK_UGC
    duration_seconds: 12
    minimum_words: 30
    target_min_words: 32
    target_max_words: 34
    safe_max_words: 34
    hard_ceiling_words: 36
    underfill_risk: Mid-clip dead air makes the cut feel stitched together instead of deliberate.
    overfill_risk: Spoken beats crowd out proof visuals and product handling.
  - language: BM
    pace_class: BRISK_UGC
    duration_seconds: 15
    minimum_words: 37
    target_min_words: 40
    target_max_words: 42
    safe_max_words: 42
    hard_ceiling_words: 45
    underfill_risk: Long clip length amplifies filler behavior when the dialogue arc is too thin.
    overfill_risk: Dialogue loses clarity because phrases stack faster than visual proof can support.
  - language: BM
    pace_class: BRISK_UGC
    duration_seconds: 16
    minimum_words: 40
    target_min_words: 42
    target_max_words: 44
    safe_max_words: 45
    hard_ceiling_words: 48
    underfill_risk: Extension clips risk seam lag if the second block has too little spoken payload.
    overfill_risk: Overpacked continuation creates rushed seam audio and thin visual breathing room.
  - language: BM
    pace_class: BRISK_UGC
    duration_seconds: 18
    minimum_words: 45
    target_min_words: 48
    target_max_words: 50
    safe_max_words: 50
    hard_ceiling_words: 54
    underfill_risk: Three-beat commercial clips expose seam delay quickly when the middle payload is too thin.
    overfill_risk: Over-compressing 18s dialogue makes mid-clip continuation sound mechanical instead of spoken.
