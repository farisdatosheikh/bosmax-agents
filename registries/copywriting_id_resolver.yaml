validation_rules:
- rule_id: COPYWRITING_ID_NOT_FOUND
  description: Fail closed if Copywriting_ID cannot resolve from canonical ID or alias
    map.
- rule_id: COPYWRITING_STATUS_INVALID
  description: Fail closed if Runtime_Allowed is true but Status is not APPROVED,
    LOCKED, or SEED_READY.
- rule_id: TEMPLATE_SILO_MISMATCH
  description: Fail closed if template lane or silo does not match the selected copy
    pack.
- rule_id: STEALTH_DIRECT_CROSSOVER
  description: Fail closed if STEALTH product resolves a DIRECT pack or DIRECT product
    resolves a STEALTH pack without review.
- rule_id: BOSMAX_SERUM_PROVENANCE_REQUIRED
  description: Fail closed if BOSMAX_SERUM STEALTH packs lack required provenance
    nodes.
- rule_id: UNSAFE_MANUAL_OVERRIDE
  description: Fail closed if manual override is present without Needs Compliance
    Review.
- rule_id: NOTION_SAFE_EXPORT_ONLY
  description: Do not expose source paths, raw provenance nodes, or compliance internals
    in NOTION_EXPORT_VIEW.
- rule_id: COMMAND_CENTRE_BEGINNER_VIEW_ONLY
  description: Command Centre beginner copy ID view must exclude Hook, USP_1, USP_2,
    USP_3, and CTA.
- rule_id: COMMAND_CENTRE_PRODUCTION_STATUS
  description: Command Centre default production view should use APPROVED or LOCKED
    only; SEED_READY must be clearly marked staging.
- rule_id: COMMAND_CENTRE_PRODUCT_VIEW_FILTER
  description: Product-specific Command Centre copy ID views must fail closed on cross-product
    or cross-silo rows.
- rule_id: SESSION_ONLY_NO_REGISTRY_WRITEBACK
  description: ON_THE_FLY session-only templates must not claim reusable registry
    writeback authority.
