# ─────────────────────────────────────────────────────────────────────────────
# FORBIDDEN PHRASE CLASSES — FOR ALL MWCB FINAL / APPROVED COPY ROWS
# ─────────────────────────────────────────────────────────────────────────────

forbidden_phrase_classes:

  product_truth_violations:
    description: "These phrases describe applicator types that do not exist on the WG40 bottle."
    phrases:
      - "roll-on"
      - "roll on"
      - "roller"
      - "rollerball"
      - "pump"
      - "spray"
      - "dropper"

  medical_cure_claims:
    description: "These phrases assert treatment, cure, or medical action."
    phrases:
      - "ubat"
      - "sembuh"
      - "merawat"
      - "penawar"
      - "rawatan medis"
      - "antiseptik"
      - "antibakteria"

  child_safety_claims:
    description: "Child and infant safety claims require separate safety review approval."
    phrases:
      - "selamat untuk bayi"
      - "selamat untuk kanak-kanak"
      - "baby safe"

  respiratory_channel_claims:
    description: "Direct respiratory mechanism claims beyond sensory comfort framing."
    phrases:
      - "buka saluran hidung"
      - "longgarkan kahak"
      - "lapangkan saluran pernafasan"

  postnatal_high_risk_claims:
    description: "Postnatal mechanism claims that imply medical physiological action."
    phrases:
      - "mengecutkan rahim"
      - "mengempiskan perut"
      - "involution uterus"

  guaranteed_time_claims:
    description: >
      Guaranteed time claims are forbidden unless explicitly framed as
      sensory/experience claims (e.g. 'rasa beza dalam 10 saat' is allowed
      if clearly sensory; 'sembuh dalam 10 saat' is forbidden).
    phrases:
      - "sembuh dalam"
      - "hilang dalam"
      - "pulih dalam"

