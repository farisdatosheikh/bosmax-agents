    - "AIDA"
    - "HSO"
    - "HPAS"
  deferred_formulas:
    - formula: "SAVAGE_HPAS"
      status: "DEFERRED_UNTIL_COMPLIANCE_PROVEN"
      reason: >
        SAVAGE_HPAS uses aggressive friction framing. Defer until Phase 1
        copy packs have cleared compliance review and proven safe framing
        patterns are established for MWCB.

