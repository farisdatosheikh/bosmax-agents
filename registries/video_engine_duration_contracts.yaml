version: 1
description: >
  Repo-level deterministic duration and block-planning contract for BOSMAX video
  runs. This registry exists to stop invalid long-form math, seam dead-air, and
  unverified Flow/VEO assumptions from leaking into Notion execution.
governance:
  canonical_authority:
    - .claude/CLAUDE.md
    - BOSMAX_HARD_ENGINE_CONTRACTS_v1.md
    - BOSMAX_GROK_EXTENSION_SEAM_TEMPLATES_v1.md
    - BOSMAX_RUNTIME_STATE_MACHINE_v1.md
    - BOSMAX_VEO31_FLOW_CONTRACT_DECISION_v1.md
  validator: scripts/validate_video_block_contracts.py
  planner: scripts/video_block_plan.py
  fail_closed_rules:
    - GROK blocks must be exactly 6s or 10s.
    - GROK totals above 10s must resolve into explicit block arrays.
    - Non-final GROK blocks must carry bridge-out.
    - Non-first GROK blocks must carry bridge-in and speech resume inside 0.5s-1.0s.
    - VEO_3_1 clip-chain ready status must be backed by BOSMAX_VEO31_FLOW_CONTRACT_DECISION_v1.md.
    - GOOGLE_FLOW must not be promoted to production-ready long-form execution without explicit verified evidence.
engines:
  GROK:
    authority_status: VERIFIED
    notion_execution_status: READY
    readiness_status: READY
    engine_family: SHORT_FORM_EXTENSION
    supports_multi_block: true
    execution_mode: EXTENSION
    max_block_duration_seconds: 10
    valid_block_durations_seconds: [6, 10]
    authority_refs:
      - .claude/CLAUDE.md
      - BOSMAX_HARD_ENGINE_CONTRACTS_v1.md
      - BOSMAX_GROK_EXTENSION_SEAM_TEMPLATES_v1.md
      - BOSMAX_RUNTIME_STATE_MACHINE_v1.md
      - BOSMAX_BM_UGC_SELL_THROUGH_COPY_ARCHITECTURE_v1.md
    single_block_durations_seconds: [6, 10]
    valid_block_durations_seconds: [6, 10]
    valid_total_durations_seconds: [6, 10, 12, 16, 18, 20, 30]
    default_total_to_blocks:
      6: [6]
      10: [10]
      12: [6, 6]
      16: [10, 6]
      18: [6, 6, 6]
      20: [10, 10]
      30: [10, 10, 10]
    seam_contract:
      require_previous_clip_wording: true
      require_bridge_out_on_non_final_blocks: true
      require_bridge_in_on_non_first_blocks: true
      speech_resume_window_seconds:
        min: 0.5
        max: 1.0
      continuity_goal: Continue the exact semantic thread from the previous clip without dead air.
      forbidden_patterns:
        - Internal labels such as Block 1 or Block 2 in operator-facing prompt text.
        - Fresh greeting or re-introduction at the start of extension blocks.
        - Reposition-only opening beats before speech resumes.
    block_role_defaults:
      12:
        - block_index: 1
          role: HOOK_PAIN
          bridge_out_required: true
          bridge_in_required: false
        - block_index: 2
          role: RELIEF_CTA
          bridge_out_required: false
          bridge_in_required: true
      16:
        - block_index: 1
          role: HOOK_PAIN_FRICTION
          bridge_out_required: true
          bridge_in_required: false
        - block_index: 2
          role: RELIEF_CTA
          bridge_out_required: false
          bridge_in_required: true
      18:
        - block_index: 1
          role: HOOK_PAIN
          bridge_out_required: true
          bridge_in_required: false
        - block_index: 2
          role: FRICTION_PROOF
          bridge_out_required: true
          bridge_in_required: true
        - block_index: 3
          role: RELIEF_CTA
          bridge_out_required: false
          bridge_in_required: true
      20:
        - block_index: 1
          role: HOOK_PAIN_FRICTION
          bridge_out_required: true
          bridge_in_required: false
        - block_index: 2
          role: RELIEF_PROOF_CTA
