version: 1
description: >
  Repo-level deterministic duration and block-planning contract for BOSMAX video
  runs. This registry exists to stop invalid long-form math, seam dead-air, and
  unverified Flow/VEO assumptions from leaking into Notion execution.
governance:
  canonical_authority:
    - .claude/CLAUDE.md
    - BOSMAX_HARD_ENGINE_CONTRACTS_v1.md
    - BOSMAX_GROK_EXTENSION_SEAM_TEMPLATES_v1.md
    - BOSMAX_RUNTIME_STATE_MACHINE_v1.md
  validator: scripts/validate_video_block_contracts.py
  planner: scripts/video_block_plan.py
  fail_closed_rules:
    - GROK blocks must be exactly 6s or 10s.
    - GROK totals above 10s must resolve into explicit block arrays.
    - Non-final GROK blocks must carry bridge-out.
    - Non-first GROK blocks must carry bridge-in and speech resume inside 0.5s-1.0s.
    - Google Flow and VEO 3.1 remain NEEDS_REVIEW until a verified long-form authority surface is hardened.
engines:
  GROK:
    authority_status: VERIFIED
    notion_execution_status: READY
    engine_family: SHORT_FORM_EXTENSION
    supports_multi_block: true
    execution_mode: EXTENSION
    authority_refs:
      - .claude/CLAUDE.md
      - BOSMAX_HARD_ENGINE_CONTRACTS_v1.md
      - BOSMAX_GROK_EXTENSION_SEAM_TEMPLATES_v1.md
      - BOSMAX_RUNTIME_STATE_MACHINE_v1.md
      - BOSMAX_BM_UGC_SELL_THROUGH_COPY_ARCHITECTURE_v1.md
    single_block_durations_seconds: [6, 10]
    valid_block_durations_seconds: [6, 10]
    valid_total_durations_seconds: [6, 10, 12, 16, 18, 20, 30]
    default_total_to_blocks:
      6: [6]
      10: [10]
      12: [6, 6]
      16: [10, 6]
      18: [6, 6, 6]
      20: [10, 10]
      30: [10, 10, 10]
    seam_contract:
      require_previous_clip_wording: true
      require_bridge_out_on_non_final_blocks: true
      require_bridge_in_on_non_first_blocks: true
      speech_resume_window_seconds:
        min: 0.5
        max: 1.0
      continuity_goal: Continue the exact semantic thread from the previous clip without dead air.
      forbidden_patterns:
        - Internal labels such as Block 1 or Block 2 in operator-facing prompt text.
        - Fresh greeting or re-introduction at the start of extension blocks.
        - Reposition-only opening beats before speech resumes.
    block_role_defaults:
      12:
        - block_index: 1
          role: HOOK_PAIN
          bridge_out_required: true
          bridge_in_required: false
        - block_index: 2
          role: RELIEF_CTA
          bridge_out_required: false
          bridge_in_required: true
      16:
        - block_index: 1
          role: HOOK_PAIN_FRICTION
          bridge_out_required: true
          bridge_in_required: false
        - block_index: 2
          role: RELIEF_CTA
          bridge_out_required: false
          bridge_in_required: true
      18:
        - block_index: 1
          role: HOOK_PAIN
          bridge_out_required: true
          bridge_in_required: false
        - block_index: 2
          role: FRICTION_PROOF
          bridge_out_required: true
          bridge_in_required: true
        - block_index: 3
          role: RELIEF_CTA
          bridge_out_required: false
          bridge_in_required: true
      20:
        - block_index: 1
          role: HOOK_PAIN_FRICTION
          bridge_out_required: true
          bridge_in_required: false
        - block_index: 2
          role: RELIEF_PROOF_CTA
          bridge_out_required: false
          bridge_in_required: true
      30:
        - block_index: 1
          role: HOOK_PAIN_FRICTION
          bridge_out_required: true
          bridge_in_required: false
        - block_index: 2
          role: RELIEF_PROOF_DEVELOPMENT
          bridge_out_required: true
          bridge_in_required: true
        - block_index: 3
          role: CTA_CLOSE
          bridge_out_required: false
          bridge_in_required: true
  KLING_3_0:
    authority_status: VERIFIED
    notion_execution_status: READY
    engine_family: SINGLE_BLOCK
    supports_multi_block: false
    execution_mode: SINGLE_BLOCK_EXECUTION
    authority_refs:
      - .claude/CLAUDE.md
      - MASTER_IGNITION_TEMPLATE.md
      - BOSMAX_RUNTIME_STATE_MACHINE_v1.md
    single_block_durations_seconds: [3, 5, 10, 15]
    valid_total_durations_seconds: [3, 5, 10, 15]
  SEEDANCE_2_0:
    authority_status: VERIFIED
    notion_execution_status: READY
    engine_family: SINGLE_BLOCK
    supports_multi_block: false
    execution_mode: SINGLE_BLOCK_EXECUTION
    authority_refs:
      - .claude/CLAUDE.md
      - MASTER_IGNITION_TEMPLATE.md
      - BOSMAX_RUNTIME_STATE_MACHINE_v1.md
    single_block_durations_seconds: [5, 10, 15]
    valid_total_durations_seconds: [5, 10, 15]
  VEO_3_1:
    authority_status: NEEDS_REVIEW
    notion_execution_status: MANUAL_REVIEW_ONLY
    engine_family: LONGFORM_PROPOSED
    supports_multi_block: true
    execution_mode: PROPOSED_CHAINING
    review_reason: >
      Repo authority is mixed. Legacy manifest exposes 8s block caps and
      16s-56s totals, while the current BOSMAX live routing layer does not yet
      provide a hardened downstream Notion contract for long-form Flow/VEO
      execution. Treat this as proposed only until architect review lands.
    authority_refs:
      - MASTER_IGNITION_TEMPLATE.md
      - SATELLITE_04_MAPPING_MATRIX.md
      - BOSMAX_RUNTIME_STATE_MACHINE_v1.md
      - .claude/CLAUDE.md
    proposed_constraints:
      proposed_single_block_max_seconds: 8
      proposed_total_durations_seconds: [4, 6, 8, 16, 24, 32, 40, 48, 56]
      proposed_default_block_rule: Chunk into 8s windows with 24-frame temporal bridge.
      proposed_temporal_bridge: 24_FRAME_TEMPORAL_BRIDGE
      proposed_context_sync: FIRST_LAST_FRAME_STITCHING
      proposed_identity_lock: BIOMETRIC_DESCRIPTOR_ANCHORING
  GOOGLE_FLOW:
    authority_status: NEEDS_REVIEW
    notion_execution_status: MANUAL_REVIEW_ONLY
    engine_family: LONGFORM_PROPOSED
    supports_multi_block: true
    execution_mode: PROPOSED_CHAINING
    review_reason: >
      Google Flow is referenced as a live engine surface, but the repo does not
      yet expose a verified deterministic block contract for downstream Notion
      planning. Proposed long-form behavior must remain visibly marked as
      NEEDS_REVIEW.
    authority_refs:
      - .claude/CLAUDE.md
      - MASTER_IGNITION_TEMPLATE.md
      - SATELLITE_04_MAPPING_MATRIX.md
    proposed_constraints:
      proposed_single_block_max_seconds: 8
      proposed_temporal_bridge: 24_FRAME_TEMPORAL_BRIDGE
      proposed_context_sync: FIRST_LAST_FRAME_STITCHING
      proposed_identity_lock: BIOMETRIC_DESCRIPTOR_ANCHORING
