version: 1

authority:
  repo_truth: true
  notion_downstream_only: true
  fastmoss_is_source_signal_not_permission_gate: true

route_modes:
  REGISTERED_PRODUCT:
    description: Product resolved from products/*.yaml or an existing product-specific workbook sheet.
    output_status: REGISTERED
    source_tier: product_specific_registry
  FAMILY_MATCHED_PRODUCT:
    description: Product is not individually registered but maps cleanly into an existing family workbook lane.
    output_status: FAMILY_MATCHED
    source_tier: product_family_workbook_copy_pack
  ON_THE_FLY_PRODUCT:
    description: Product is neither registered nor family-matched, but intake is sufficient and the compliance posture is not high-risk.
    output_status: ON_THE_FLY
    source_tier: on_the_fly_intake
  REVIEW_ONLY_PRODUCT:
    description: Product or claim posture is high-risk and must fail closed into manual review.
    output_status: REVIEW_ONLY
    source_tier: review_only_fallback

source_hierarchy:
  - product_specific_registry
  - product_specific_workbook_copy_pack
  - product_family_workbook_copy_pack
  - category_mechanic_archetype
  - on_the_fly_intake
  - review_only_fallback

minimum_on_the_fly_intake:
  required_fields:
    - product_name
    - category
    - target_user
    - main_problem_solved
    - main_benefit
    - product_format
    - product_size_or_scale
    - platform
    - language
    - compliance_class
    - visual_reference_status
  optional_fields:
    - price
    - offer
    - differentiator
    - competitor_context
    - product_image
    - target_persona
    - claim_restrictions
    - usage_scenario

risk_detection:
  high_risk_categories:
    - baby
    - maternity
    - pregnancy
    - supplement
    - medical
    - medicine
    - health test
    - sexual wellness
    - adult
    - restricted
  review_only_triggers:
    keywords:
      - baby
      - bayi
      - maternity
      - pregnancy
      - pregnant
      - hamil
      - supplement
      - supplemen
      - vitamin
      - medical
      - medicine
      - ubat
      - penawar
      - cure
      - sembuh
      - merawat
      - merawat penyakit
      - disease
      - diagnosis
      - clinic
      - clinical
      - prescription
      - sexual wellness
      - intimate
      - erectile
      - libido
      - fertility
      - adult
      - restricted
    compliance_classes:
      - HIGH
      - REVIEW_ONLY
      - RED
  forbidden_claim_patterns:
    - cure
    - sembuh
    - merawat
    - ubat
    - penawar
    - treat disease
    - diagnose
    - prescription strength
    - clinical proof

