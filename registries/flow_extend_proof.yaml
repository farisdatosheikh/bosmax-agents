version: 2
description: >
  Repo-backed proof manifest for BOSMAX GOOGLE_FLOW Flow Extend. Flow UI 8s
  continuation is now a reviewed deterministic multi-block surface when child
  block rows, per-block WPS, previous-final-second continuity, and validator
  proof are present. Vertex 7s continuation remains documented but review-only.
governance:
  authority: BOSMAX_EXECUTION_KERNEL_CONTRACT_v1.md
  decision_record: BOSMAX_VEO31_FLOW_CONTRACT_DECISION_v1.md
  engine_contract: registries/video_engine_duration_contracts.yaml
  validator: scripts/validate_flow_extend_proof.py
  default_ready_status: READY_REVIEWED_FLOW_EXTEND
  unsupported_mode_status: NEEDS_REVIEW
  fail_closed_rules:
    - GOOGLE_FLOW long duration must create child block rows. Monolithic prompt posture is forbidden.
    - FLOW_EXTEND_UI ready posture requires per-block WPS, seam proof, and previous-final-second continuity on every continuation block.
    - FLOW_EXTEND_VERTEX remains NEEDS_REVIEW until a dedicated Vertex proof lane exists.
    - Shared copywriting/avatar resolver payload must match the GROK/VEO pattern.
    - formulaResult handles and omitted rollups are not accepted as proof.
flow_extend_runs:
  - run_id: SAMPLE-FLOW-16S-RIZAL
    notion_url: ""
    engine: GOOGLE_FLOW
    execution_mode: FLOW_EXTEND_UI
    execution_status: READY_REVIEWED_FLOW_EXTEND
    product_id: BOSMAX_SERUM
    copywriting_id: BOSMAX_SERUM_CP_0001
    avatar_context_id: BOSMAX_AVP_0001
    avatar_pool_id: null
    total_duration_seconds: 16
    block_plan: [8, 8]
    shared_copywriting_avatar_resolver_payload: true
    child_blocks_required: true
    child_block_count_expected: 2
    output_test_report: >
      Flow UI reviewed run. Parent run exists, child rows exist, block split
      is 8s + 8s, and continuity is carried by previous-final-second state on
      the continuation block.
    validator_proof_capture: "VALIDATION PASSED :: SAMPLE-FLOW-16S-RIZAL :: Flow UI child-block seam proof."
    child_blocks:
      - block_index: 1
        block_duration_seconds: 8
        block_role: HOOK_PAIN_FRICTION
        dialogue_budget_duration_seconds: 8
        previous_clip_final_second_state: ""
        continuity_goal: Establish the BOSMAX Serum hook and lock the ending hand position for the extension seam.
        identity_reanchor: Rizal stays the same Malay male persona in RIZAL_CASUAL_01 with the same close-hold delivery style.
        product_reanchor: BOSMAX Serum 5ML remains the only hero product, held close to chest height with lip-balm scale truth.
        scene_continuity_notes: Quiet home reset corner stays unchanged, with the same sofa edge, warm lamp spill, and tight handheld framing.
        audio_continuity_notes: Spoken delivery stays brisk, close-mic, and conversational with no music reset.
        frame_bridge_notes: End on a stable chest-up frame with the serum lifted beside the sternum and eyes still locked to camera.
        bridge_out: End the block with the bottle still raised and the hand grip unchanged for the extension pickup.
        bridge_in: ""
        final_block_dialogue: "Kalau badan rasa lemau lepas kerja, serum ni masuk mudah, simpan senyap dalam poket, dan terus bantu keyakinan nampak stabil."
        block_dialogue_word_count: 20
        block_prompt_manual_output: READY_FLOW_UI_SAMPLE_16S_RIZAL_BLOCK_1
        block_status: READY_REVIEWED_FLOW_EXTEND
        validator_proof: "VALIDATION PASSED :: SAMPLE-FLOW-16S-RIZAL :: block 1 seam + WPS checked."
      - block_index: 2
        block_duration_seconds: 8
        block_role: RELIEF_CTA
        dialogue_budget_duration_seconds: 8
        previous_clip_final_second_state: Rizal ends block one still facing camera, serum raised near chest, right wrist steady, and speech carries through the final beat.
        continuity_goal: Continue the same spoken thread without reset and close on relief plus CTA.
        identity_reanchor: Rizal stays identical in face, wardrobe, posture, and handheld UGC energy.
        product_reanchor: BOSMAX Serum remains visible in the same right-hand grip with the same size and label truth.
        scene_continuity_notes: Same lamp spill, same sofa edge, same camera distance, and no location swap.
        audio_continuity_notes: Continue the same sentence rhythm with no silence gap or fresh greeting.
        frame_bridge_notes: Open on the same chest-up frame and preserve the final bottle position before the wrist relaxes slightly.
        bridge_out: ""
        bridge_in: Continue from the exact final second hand position and keep the bottle near chest level before the next phrase begins.
        final_block_dialogue: "Sambung terus, pakai malam ni, rasa lebih kemas bila pasangan dekat, botol kecil tak serabut, dan rutin pun jadi konsisten."
        block_dialogue_word_count: 20
        block_prompt_manual_output: READY_FLOW_UI_SAMPLE_16S_RIZAL_BLOCK_2
        block_status: READY_REVIEWED_FLOW_EXTEND
        validator_proof: "VALIDATION PASSED :: SAMPLE-FLOW-16S-RIZAL :: block 2 seam + WPS checked."

