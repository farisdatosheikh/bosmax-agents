- rule_id: AVATAR_POOL_REPEAT_WINDOW
  description: Fail closed if AUTO_ROTATE cannot satisfy the configured no-repeat
    window.
- rule_id: UNSAFE_MANUAL_OVERRIDE
  description: Fail closed if manual override is present without Needs Compliance
