version: 2
description: >
  Repo-backed manifest for BOSMAX Notion sample run readiness. Notion remains
  downstream UI only. Repo manifests and validators remain the source of truth
  for READY, READY_REVIEWED_FLOW_EXTEND, NEEDS_PROOF, and NEEDS_REVIEW posture.
governance:
  authority: BOSMAX_EXECUTION_KERNEL_CONTRACT_v1.md
  handoff_doc: BOSMAX_NOTION_MULTI_BLOCK_VIDEO_HANDOFF_v1.md
  flow_parity_audit: docs/google_flow_parity_audit_v1.md
  validator: scripts/validate_notion_sample_readiness.py
  fail_closed_rules:
    - block_plan must match engine contract from video_block_plan.py.
    - READY and READY_REVIEWED_FLOW_EXTEND runs require validator capture.
    - formulaResult and omitted rollup values are not accepted as proof.
    - GOOGLE_FLOW FLOW_EXTEND_VERTEX remains NEEDS_REVIEW until a dedicated proof lane exists.
    - GOOGLE_FLOW FLOW_EXTEND_UI may only use READY_REVIEWED_FLOW_EXTEND when child-block seam proof exists.
sample_runs:
  - sample_id: SAMPLE-HYBRID-01
    notion_url: ""
    engine: GROK
    execution_mode: EXTENSION
    total_duration_seconds: 10
    block_plan: [10]
    execution_status: READY
    copywriting_id: BOSMAX_SERUM_CP_0001
    avatar_context_id: BOSMAX_AVP_0001
    parent_video_run_required: true
    child_blocks_required: false
    child_block_count_expected: 1
    product_truth_check_required: true
    avatar_check_required: true
    wps_audit_required: true
    engine_contract_summary_required: true
    block_plan_summary_required: true
    output_test_report_required: true
    validator_proof_required: true
    formula_result_not_accepted_as_proof: true
    omitted_rollup_not_accepted_as_proof: true
    output_test_report: >
      GROK 10s single-block run. Parent run exists, single block confirmed on
      the 10s engine contract, WPS is within the 10s corridor, and copywriting
      and avatar resolvers are anchored to BOSMAX Serum STEALTH lane.
    validator_capture: "VALIDATION PASSED :: SAMPLE-HYBRID-01 :: GROK 10s single-block engine contract and WPS proof captured."
    notes: Single-block GROK 10s sample run. BOSMAX Serum STEALTH. RIZAL avatar.

