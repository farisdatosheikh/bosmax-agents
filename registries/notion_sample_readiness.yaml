version: 1
description: >
  Repo-backed manifest for BOSMAX Notion sample run readiness.
  Operators fill proof fields here after creating Notion records.
  Validator cross-references engine contracts from video_block_plan.py.
  Notion pages remain downstream UI — this manifest is the repo source of truth.
governance:
  authority: BOSMAX_EXECUTION_KERNEL_CONTRACT_v1.md
  handoff_doc: BOSMAX_NOTION_MULTI_BLOCK_VIDEO_HANDOFF_v1.md
  validator: scripts/validate_notion_sample_readiness.py
  fail_closed_rules:
    - MANUAL_REVIEW_ONLY runs must never be marked execution_status READY.
    - block_plan must match engine contract from video_block_plan.py.
    - READY runs require all proof fields to be true / non-empty.
    - formulaResult and omitted rollup values are not accepted as proof.
    - GOOGLE_FLOW runs must remain MANUAL_REVIEW_ONLY until direct proof is hardened.
sample_runs:
  - sample_id: SAMPLE-HYBRID-01
    notion_url: ""
    engine: GROK
    execution_mode: EXTENSION
    total_duration_seconds: 10
    block_plan: [10]
    execution_status: NEEDS_PROOF
    parent_video_run_required: true
    child_blocks_required: false
    child_block_count_expected: 1
    product_truth_check_required: true
    avatar_check_required: true
    wps_audit_required: true
    engine_contract_summary_required: true
    block_plan_summary_required: true
    output_test_report_required: true
    validator_proof_required: true
    formula_result_not_accepted_as_proof: true
    omitted_rollup_not_accepted_as_proof: true
    validator_capture: ""
    notes: "Single-block GROK 10s sample run"

  - sample_id: SAMPLE-HYBRID-02
    notion_url: ""
    engine: GROK
    execution_mode: EXTENSION
    total_duration_seconds: 6
    block_plan: [6]
    execution_status: NEEDS_PROOF
    parent_video_run_required: true
    child_blocks_required: false
    child_block_count_expected: 1
    product_truth_check_required: true
    avatar_check_required: true
    wps_audit_required: true
    engine_contract_summary_required: true
    block_plan_summary_required: true
    output_test_report_required: true
    validator_proof_required: true
    formula_result_not_accepted_as_proof: true
    omitted_rollup_not_accepted_as_proof: true
    validator_capture: ""
    notes: "Single-block GROK 6s sample run"

  - sample_id: SAMPLE-HYBRID-GROK-16S-RIZAL
    notion_url: ""
    engine: GROK
    execution_mode: EXTENSION
    total_duration_seconds: 16
    block_plan: [10, 6]
    execution_status: NEEDS_PROOF
    parent_video_run_required: true
    child_blocks_required: true
    child_block_count_expected: 2
    product_truth_check_required: true
    avatar_check_required: true
    wps_audit_required: true
    engine_contract_summary_required: true
    block_plan_summary_required: true
    output_test_report_required: true
    validator_proof_required: true
    formula_result_not_accepted_as_proof: true
    omitted_rollup_not_accepted_as_proof: true
    validator_capture: ""
    notes: "Multi-block GROK 16s = 10s + 6s. RIZAL avatar. Child block records required."

  - sample_id: SAMPLE-VEO31-16S-CLIP-CHAIN-RIZAL
    notion_url: ""
    engine: VEO_3_1
    execution_mode: CLIP_CHAIN
    total_duration_seconds: 16
    block_plan: [8, 8]
    execution_status: NEEDS_PROOF
    parent_video_run_required: true
    child_blocks_required: true
    child_block_count_expected: 2
    product_truth_check_required: true
    avatar_check_required: true
    wps_audit_required: true
    engine_contract_summary_required: true
    block_plan_summary_required: true
    output_test_report_required: true
    validator_proof_required: true
    formula_result_not_accepted_as_proof: true
    omitted_rollup_not_accepted_as_proof: true
    validator_capture: ""
    notes: "VEO_3_1 clip-chain 16s = 8s + 8s. RIZAL avatar. Frame bridge required."

  - sample_id: SAMPLE-VEO31-24S-CLIP-CHAIN-RIZAL
    notion_url: ""
    engine: VEO_3_1
    execution_mode: CLIP_CHAIN
    total_duration_seconds: 24
    block_plan: [8, 8, 8]
    execution_status: NEEDS_PROOF
    parent_video_run_required: true
    child_blocks_required: true
    child_block_count_expected: 3
    product_truth_check_required: true
    avatar_check_required: true
    wps_audit_required: true
    engine_contract_summary_required: true
    block_plan_summary_required: true
    output_test_report_required: true
    validator_proof_required: true
    formula_result_not_accepted_as_proof: true
    omitted_rollup_not_accepted_as_proof: true
    validator_capture: ""
    notes: "VEO_3_1 clip-chain 24s = 8s + 8s + 8s. RIZAL avatar. Frame bridge required."

  - sample_id: SAMPLE-FLOW-EXTEND-16S-RIZAL
    notion_url: ""
    engine: GOOGLE_FLOW
    execution_mode: FLOW_EXTEND
    total_duration_seconds: 16
    block_plan: []
    execution_status: MANUAL_REVIEW_ONLY
    allowed_reason_if_manual_review: >
      GOOGLE_FLOW.FLOW_EXTEND remains MANUAL_REVIEW_ONLY until direct
      operational proof is hardened. Flow Extend requires previous clip
      final-second state and is not deterministic clip-chain math.
      Do not promote to READY without explicit operational proof evidence.
    parent_video_run_required: true
    child_blocks_required: false
    child_block_count_expected: 0
    product_truth_check_required: true
    avatar_check_required: true
    wps_audit_required: false
    engine_contract_summary_required: true
    block_plan_summary_required: false
    output_test_report_required: false
    validator_proof_required: false
    formula_result_not_accepted_as_proof: true
    omitted_rollup_not_accepted_as_proof: true
    validator_capture: ""
    notes: "GOOGLE_FLOW Flow Extend — MANUAL_REVIEW_ONLY. Cannot be marked READY."
