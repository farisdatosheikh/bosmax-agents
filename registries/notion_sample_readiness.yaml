    validator_proof_required: true
    formula_result_not_accepted_as_proof: true
    omitted_rollup_not_accepted_as_proof: true
    output_test_report: >
      GROK 16s multi-block run. Block split is 10s + 6s on the GROK dual-duration
      contract. Block one ends with serum raised beside sternum and locks the bridge
      pose for the extension pickup. Block two carries previous-final-second state,
      bridge-in text, and identity and product reanchors. Copywriting and avatar
      resolvers are shared with the GOOGLE_FLOW lane.
    validator_capture: "VALIDATION PASSED :: SAMPLE-HYBRID-GROK-16S-RIZAL :: GROK 16s 10s+6s child-block seam proof captured."
    child_blocks:
      - block_index: 1
        block_duration_seconds: 10
        block_role: HOOK_PAIN_FRICTION
        dialogue_budget_duration_seconds: 10
        previous_clip_final_second_state: ""
        continuity_goal: Establish the BOSMAX Serum hook and end with a locked serum-up sternum pose for the extension pickup.
        identity_reanchor: Rizal stays the same Malay male persona in RIZAL_CASUAL_01 with the same close-hold delivery style.
        product_reanchor: BOSMAX Serum 5ML remains the only hero product in a close chest-height hold with lip-balm scale truth.
        scene_continuity_notes: Quiet home reset corner stays unchanged with the same sofa edge, warm lamp spill, and tight handheld crop.
        audio_continuity_notes: Brisk single-speaker close-mic cadence with no silence padding.
        frame_bridge_notes: End on a front-facing chest-up frame with the serum raised beside the sternum and elbow tucked.
        bridge_out: Hold serum beside sternum, keep gaze locked to lens, and maintain the same right-hand grip for the extension block.
        bridge_in: ""
        final_block_dialogue: "Kalau badan rasa lemau lepas kerja, serum ni absorb cepat, senang bawa, dan bantu keyakinan nampak stabil malam ni."
        block_dialogue_word_count: 19
        block_prompt_manual_output: READY_GROK_SAMPLE_16S_RIZAL_BLOCK_1
        block_status: READY
        validator_proof: "VALIDATION PASSED :: SAMPLE-HYBRID-GROK-16S-RIZAL :: block 1 seam + WPS checked."
      - block_index: 2
        block_duration_seconds: 6
        block_role: RELIEF_CTA
        dialogue_budget_duration_seconds: 6
        previous_clip_final_second_state: Rizal ends block one still facing camera, serum raised beside sternum, right wrist steady, and final word lands without dropping the bottle.
        continuity_goal: Continue the same spoken thread immediately and close on relief plus CTA.
        identity_reanchor: Rizal identity, wardrobe, facial framing, and close-hold UGC energy stay unchanged.
        product_reanchor: BOSMAX Serum remains the same hero bottle in the same right-hand chest-height grip with scale truth preserved.
        scene_continuity_notes: Same home reset corner, same lamp spill, same tight handheld framing, and no environment drift.
        audio_continuity_notes: Speech resumes immediately from the prior clause with the same brisk tone and no pacing drop.
        frame_bridge_notes: Reopen on the same sternum-raised serum frame before the wrist softens into the CTA close.
        bridge_out: ""
        bridge_in: Continue from the same serum-up sternum frame and carry the CTA forward before any pose reset.
        final_block_dialogue: "Teruskan malam ni, rutin konsisten, rasa lebih yakin dan kemas."
        block_dialogue_word_count: 11
        block_prompt_manual_output: READY_GROK_SAMPLE_16S_RIZAL_BLOCK_2
        block_status: READY
        validator_proof: "VALIDATION PASSED :: SAMPLE-HYBRID-GROK-16S-RIZAL :: block 2 seam + WPS checked."
