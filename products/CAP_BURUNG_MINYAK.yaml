# ─────────────────────────────────────────────
# COPYWRITING ANGLES — 20 SETS
# Format per set:
#   angle_id, angle_name, target_segment, hook, usp_1, usp_2, usp_3, body, cta
# Language: Bahasa Malaysia (natural, conversational TikTok tone)
