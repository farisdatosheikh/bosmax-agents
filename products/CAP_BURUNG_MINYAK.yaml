copywriting_angles:

  # ── SET 01 — STRES & AROMATERAPI ──────────────────────────
  - angle_id: "A01"
    angle_name: "Stres & Aroma Terapi"
    benefit_ref: "B01"
    target_segment: "Pekerja, ibu rumah tangga, semua dewasa"
    hook: "Dah lama tak rasa tenang? Satu roll je, kepala terus sejuk."
    usp_1: "Aroma herba semulajadi — terus activate deria bau, hantar signal rileks ke otak"
    usp_2: "Tak perlu diffuser, tak perlu masa — roll, hidu, rasa bezanya dalam 10 saat"
    usp_3: "Bukan ubat, bukan supplement — rawatan aroma semulajadi yang diakui 60 tahun"
    body: "Hari-hari stress takkan habis. Tapi dengan Minyak Cap Burung, setidaknya otak boleh bernafas kejap. Roll kat belakang telinga, bawah hidung, dada. Hidu dalam-dalam. Biar aroma herba buat kerjanya."
    cta: "Scroll bawah, tekan Add to Cart. Bau dulu, putuskan kemudian."

  # ── SET 02 — RESDUNG & HIDUNG TERSUMBAT ───────────────────
  - angle_id: "A02"
    angle_name: "Resdung & Hidung Tersumbat"
    benefit_ref: "B02"
    target_segment: "Penghidap resdung kronik, musim hujan, jerebu"
    hook: "Hidung tersumbat dari pagi sampai malam? Mak nenek pun ada masalah ni. Ubat dia tak jauh."
    usp_1: "Minyak kayu putih dan herba panas buka saluran hidung dari luar — tanpa telan ubat"
    usp_2: "Roll kat batang hidung, cuping hidung, dan dahi — kerja dalam minit"
    usp_3: "Boleh guna berulang kali sepanjang hari — tiada dos, tiada kesan mengantuk"
    body: "Resdung buat hidup susah — tidur tak lena, kerja tak fokus, nafas pun penat. Minyak Cap Burung bukan penawar kekal, tapi ia bagi relief yang betul-betul kau perlukan masa serangan datang."
    cta: "Letak dalam poket sekarang. Bila resdung datang, kau dah ready."

  # ── SET 03 — BATUK, SELESEMA & SESAK DADA ─────────────────
  - angle_id: "A03"
    angle_name: "Batuk, Selesema & Sakit Dada"
    benefit_ref: "B03"
    target_segment: "Keluarga, ibu bapa, musim hujan"
    hook: "Satu keluarga batuk selesema, ubat mahal-mahal pun tak habis. Cuba cara nenek dulu."
    usp_1: "Sapu dada dan belakang — haba minyak tembus masuk, longgarkan kahak, buka nafas"
    usp_2: "Selamat untuk kanak-kanak — tiada bahan kimia keras, formula tradisional sejak 1958"
    usp_3: "Guna malam sebelum tidur — bagi anak tidur lena tanpa batuk-batuk"
    body: "Bila anak batuk malam-malam, kita pun tak boleh tidur. Sebelum terus lari ke farmasi, cuba Minyak Cap Burung. Sapu dada, leher, dan belakang anak. Biar haba semulajadi buat kerjanya malam tu."
    cta: "Simpan satu kat bilik anak. Tahu-tahu je nanti kau perlukan."

  # ── SET 04 — GATAL & GIGITAN SERANGGA ─────────────────────
  - angle_id: "A04"
    angle_name: "Gatal-Gatal & Gigitan Serangga"
    benefit_ref: "B04"
    target_segment: "Outdoor, kanak-kanak, kawasan tropika, nyamuk"
    hook: "Gigit nyamuk sampai bengkak? Jangan garuk. Roll dulu."
    usp_1: "Anti-gatal instant — cooling sensation terus padamkan rasa gatal dalam 30 saat"
    usp_2: "Aroma herba halau nyamuk — guna sebelum keluar, bukan selepas dah kena"
    usp_3: "Selamat untuk kulit sensitif — tiada steroid, tiada antihistamin, semulajadi"
    body: "Malaysia ni memang negara nyamuk. Tapi tak semua orang nak sapu bahan kimia setiap hari. Minyak Cap Burung — aroma semulajadi yang nyamuk tak suka, kulit kau pun selamat."
    cta: "Masuk dalam beg sekolah anak. Outdoor trip pun jangan lupa."

  # ── SET 05 — LUKA KECIL & BENGKAK ─────────────────────────
  - angle_id: "A05"
    angle_name: "Luka Kecil & Surut Bengkak"
    benefit_ref: "B05"
    target_segment: "Ibu bapa aktif, atlet, kanak-kanak lasak"
    hook: "Jatuh lutut, lebam main futsal, kena piring panas — first aid box kau dah cukup ke?"
    usp_1: "Haba minyak pecahkan tumpukan darah di bawah kulit — bengkak surut lebih laju"
    usp_2: "Antiseptik semulajadi — bersihkan sekitar luka kecil, kurangkan risiko jangkitan"
    usp_3: "Roll-on applicator — sentuh terus tanpa kotor tangan, hygienic untuk luka"
    body: "Bengkak dan lebam kecil memang biasa dalam kehidupan aktif. Tapi duduk tunggu surut sendiri buang masa. Roll Minyak Cap Burung, urut perlahan-lahan, biar herba masuk kerja."
    cta: "Letak kat first aid kit kau sekarang. Murah tapi kerja."

  # ── SET 06 — SAKIT GIGI & BENGKAK GUSI ────────────────────
  - angle_id: "A06"
    angle_name: "Sakit Gigi & Bengkak Gusi"
    benefit_ref: "B06"
    target_segment: "Semua umur, kanak-kanak gigi tumbuh, emergency"
    hook: "Sakit gigi tengah malam. Klinik tutup. Ubat dah habis. Satu benda boleh tolong."
    usp_1: "Eugenol semulajadi dalam minyak herba — numbing agent tradisional untuk gusi dan gigi"
    usp_2: "Roll tepi pipi luar dan urut perlahan — rasa sejuk masuk, sakit kurang dalam minit"
    usp_3: "Bukan penawar kekal — tapi cukup untuk tahan malam tu dan pergi klinik esok pagi"
    body: "Sakit gigi memang boleh buat orang gila. Tengah malam lagi teruk. Minyak Cap Burung bukan ganti pergigian — tapi ia bagi kau relief masa paling desperate tu. Nenek dah guna cara ni lama."
    cta: "Simpan satu dalam laci ubat. Malam tak ada warning."

  # ── SET 07 — BAYI KEMBUNG PERUT ───────────────────────────
  - angle_id: "A07"
    angle_name: "Bayi Kembung Perut"
    benefit_ref: "B07"
    target_segment: "Ibu muda, ibu baru bersalin, bayi 0-24 bulan"
    hook: "Bayi nangis tak berhenti. Kembung? Ini yang mak-mak senior selalu guna."
    usp_1: "Urut perlahan-lahan perut bayi dengan minyak — tekanan + haba longgarkan gas dalam usus"
    usp_2: "Formula tradisional — digunakan oleh generasi ibu Melayu selama 60+ tahun untuk bayi"
    usp_3: "Roll-on mudah — takde risiko terlampau banyak, aplikasi tepat dan terkawal"
    body: "Bayi kembung adalah perkara biasa, tapi dengar dia nangis sakit memang buat hati ibu luluh. Minyak Cap Burung — sapukan kat perut bayi, urut ikut arah jam, tengok dia bertenang semula."
    cta: "Letakkan dalam beg hospital sekarang. Guna dari hari pertama balik rumah."

  # ── SET 08 — URUTAN BADAN & SARAF ─────────────────────────
  - angle_id: "A08"
    angle_name: "Urutan Badan & Saraf"
    benefit_ref: "B08"
    target_segment: "Pekerja fizikal, warga emas, atlet, orang leher/bahu sakit"
    hook: "Leher keras macam papan selepas kerja. 5 minit sebelum tidur, roll dan urut. Esok pagi rasa beza."
    usp_1: "Minyak meresap ke dalam lapisan otot — beri haba deep-relief untuk saraf yang tegang"
    usp_2: "Sesuai untuk urutan harian — bahu, leher, pinggang, lutut, tapak kaki"
    usp_3: "Lebih berkesan dengan urutan tekanan sederhana — aktifkan peredaran darah, kurangkan kekakuan"
    body: "Orang tua kita guna minyak urut tradisional sebab ia memang berkesan. Minyak Cap Burung bukan ubat farmasi — tapi panas semulajadinya masuk dalam otot, bagi badan rasa hidup balik selepas hari yang penat."
    cta: "Satu botol untuk seluruh keluarga. Roll, urut, tidur lena."

  # ── SET 09 — SAKIT KEPALA & MIGRAIN ───────────────────────
  - angle_id: "A09"
    angle_name: "Sakit Kepala & Migrain"
    benefit_ref: "B09"
    target_segment: "Pekerja office, penghidap migrain, ibu rumah tangga"
    hook: "Kepala berdenyut masa meeting. Ubat panadol tak ada. Tapi poket selalu ada ini."
    usp_1: "Roll kat pelipis kiri kanan + dahi — menthol dan herba sejukkan tekanan dalam kepala"
    usp_2: "Kerja dalam 2-3 minit — lebih laju dari tunggu panadol dissolve dalam perut"
    usp_3: "Boleh guna atas meja kerja — tak perlu air, tak perlu henti aktiviti"
    body: "Migrain datang tanpa warning. Dan masa dia datang, semua orang sekeliling pun rasa terkesan. Minyak Cap Burung — bukan ubat keras, tapi roll kat tempat yang betul, ia bagi relief yang cukup untuk kau teruskan hari tu."
    cta: "Masuk dalam drawer meja kerja sekarang. Sakit kepala tak tunggu masa sesuai."

  # ── SET 10 — KEMBUNG PERUT & SENGGUGUT ────────────────────
  - angle_id: "A10"
    angle_name: "Kembung Perut & Senggugut (Haid)"
    benefit_ref: "B10"
    target_segment: "Wanita dewasa, remaja perempuan, senggugut bulanan"
    hook: "Senggugut sampai baring atas lantai. Ada cara lebih cepat dari tunggu painkiller."
    usp_1: "Roll dan urut perut bawah — haba minyak relakskan otot uterus yang berkontraksi"
    usp_2: "Bantu kempeskan angin dalam perut — kembung berkurang, badan rasa lebih ringan"
    usp_3: "Guna sebelum cramp teruk — preventive massage lebih efektif dari tunggu sakit dulu"
    body: "Setiap bulan mesti datang. Setiap bulan mesti sakit. Tapi tak semua orang nak telan painkiller setiap kali. Minyak Cap Burung — cara nenek-nenek kita handle senggugut. Urut, haba, bernafas."
    cta: "Simpan dalam almari ubat bilik. Bulan depan kau dah ready."

  # ── SET 11 — MUAL & MUNTAH ─────────────────────────────────
  - angle_id: "A11"
    angle_name: "Mual & Muntah / Mabuk Kenderaan"
    benefit_ref: "B11"
    target_segment: "Ibu mengandung, mabuk kenderaan, gastrik, morning sickness"
    hook: "Mabuk bas. Nak muntah tapi malu. Sapu bawah hidung dulu."
    usp_1: "Hidu aroma herba kuat — override signal mual dari otak, distract sistem saraf dari rasa nak muntah"
    usp_2: "Roll kat pergelangan tangan (titik P6) — teknik akupresur + aroma therapy gabungan"
    usp_3: "Selamat untuk ibu mengandung — tiada bahan larangan, guna dengan bimbingan doktor"
    body: "Mabuk kenderaan buatkan perjalanan jadi azab. Morning sickness buat ibu mengandung terseksa setiap pagi. Minyak Cap Burung — aroma herba pekat yang boleh bantu tenangkan sistem saraf dan kurangkan signal mual."
    cta: "Simpan dalam beg tangan. Jangan tunggu dah nak muntah baru cari."

  # ── SET 12 — KENCING MALAM ─────────────────────────────────
  - angle_id: "A12"
    angle_name: "Kencing Malam (Nocturia)"
    benefit_ref: "B12"
    target_segment: "Warga emas, orang dewasa 40+, masalah pundi kencing"
    hook: "Bangun 3-4 kali malam nak kencing. Tidur tak cukup. Ada rawatan tradisional yang mungkin boleh bantu."
    usp_1: "Lumur kawasan perut bawah dan ari-ari sebelum tidur — haba herba stimulate peredaran darah di kawasan pundi kencing"
    usp_2: "Cara rawatan tradisional Melayu yang diwarisi — bukan klaim perubatan, tapi amalan yang dipercayai"
    usp_3: "Tiada kesan sampingan — selamat untuk guna harian, konsisten adalah kunci"
    body: "Kencing malam bukan semata-mata masalah tua — ia ganggu kualiti tidur, buat badan penat siang hari. Rawatan tradisional dengan minyak herba adalah amalan yang telah digunakan dalam masyarakat Melayu lama. Cuba, konsisten, pantau sendiri hasilnya."
    cta: "Cuba 2 minggu konsisten. Roll sebelum tidur tiap malam."

  # ── SET 13 — URUTAN SEBELUM & SELEPAS BERSALIN ────────────
  - angle_id: "A13"
    angle_name: "Urutan Sebelum & Selepas Bersalin"
    benefit_ref: "B13"
    target_segment: "Ibu hamil trimester 3, ibu baru bersalin"
    hook: "Badan lenguh-lenguh masa mengandung. Badan sakit-sakit selepas bersalin. Ini yang mak-mak pakai."
    usp_1: "Melegakan sakit otot dan sendi yang terbeban semasa mengandung — selamat untuk trimester 3"
    usp_2: "Selepas bersalin — urutan dengan minyak Cap Burung bantu keluarkan angin, relakskan otot yang tertekan masa bersalin"
    usp_3: "Boleh digunakan oleh bidan dan orang tua semasa urutan tradisional — formula dipercayai"
    body: "Bersalin adalah pengalaman yang paling mencabar badan wanita. Sebelum masuk, badan dah penat mengandung. Selepas keluar, badan perlu recover. Minyak Cap Burung adalah teman setia proses ni — pegang satu dalam bag hospital."
    cta: "Masuk dalam hospital bag kau. Guna dari hari pertama."

  # ── SET 14 — PARAM & BENGKUNG ──────────────────────────────
  - angle_id: "A14"
    angle_name: "Param & Bengkung Postnatal"
    benefit_ref: "B14"
    target_segment: "Ibu selepas bersalin, bidan, rawatan pantang 44 hari"
    hook: "Nak kempiskan perut selepas bersalin? Minyak param adalah asas yang selalu dilupa."
    usp_1: "Membantu mengecutkan rahim — haba minyak tembus bantu proses involution uterus semulajadi"
    usp_2: "Wajib guna sebelum bengkung — minyak jadikan kulit lebih reseptif, bengkung lebih berkesan"
    usp_3: "Digunakan dalam rawatan param tradisional Melayu — formula yang bidan kenal dan amalkan"
    body: "Pantang 44 hari adalah pelaburan untuk kesihatan jangka panjang ibu. Dan param adalah bahagian yang paling penting. Minyak Cap Burung — lumur seluruh perut, pinggang dan punggung sebelum bengkung. Biar haba herba buat kerjanya dulu."
    cta: "Order sebelum due date. Wajib dalam kit pantang kau."

  # ── SET 15 — TRAVEL ESSENTIAL ──────────────────────────────
  - angle_id: "A15"
    angle_name: "Travel Essential / Simpanan Poket"
    benefit_ref: "MULTI"
    target_segment: "Traveller, penumpang bas/kapal terbang, haji/umrah"
    hook: "Satu botol kecil. 14 kegunaan. Bawak dalam beg dah settle separuh masalah perjalanan."
    usp_1: "Saiz travel-friendly — 30ML, muat dalam poket seluar, beg tangan, pouch haji"
    usp_2: "Cover semua emergency asas: sakit kepala, mabuk, kembung, gigitan, luka kecil"
    usp_3: "Tiada had liquid untuk penerbangan domestik — bawak naik kapal terbang tanpa masalah"
    body: "Bila travel, kita tak boleh bawa semua ubat. Tapi satu Minyak Cap Burung boleh cover banyak situasi. Mabuk dalam bas? Roll. Kepala pening sebab cuaca? Roll. Gigit nyamuk kat hotel? Roll."
    cta: "Satu untuk rumah, satu untuk beg travel. Jangan keluar rumah tanpa."

  # ── SET 16 — WARISAN KELUARGA / HERITAGE ──────────────────
  - angle_id: "A16"
    angle_name: "Warisan 1958 / Heritage Trust"
    benefit_ref: "MULTI"
    target_segment: "Orang Melayu semua umur, nostalgia, kepercayaan warisan"
    hook: "Arwah nenek kau simpan ni dalam laci dia. Mak kau pun ada. Sekarang giliran kau."
    usp_1: "Sejak 1958 — bukan trend baru, bukan viral seminggu. 60+ tahun ia berkesan untuk keluarga Melayu"
    usp_2: "Formula turun-temurun — bukan diubah ikut trend, tapi dikekalkan sebab ia memang kerja"
    usp_3: "Kepercayaan yang tak boleh dibeli dengan iklan — ia dibina satu generasi ke satu generasi"
    body: "Ada benda yang tak perlu kita proof dengan kajian saintifik sebab ia dah proven oleh masa. Minyak Cap Burung adalah antara warisan rumah tangga Melayu yang survive 3 generasi. Bukan kerana pemasaran. Kerana ia berkesan."
    cta: "Beli untuk kau. Beli untuk mak. Teruskan tradisi keluarga."

  # ── SET 17 — SATU BOTOL BANYAK KEGUNAAN ───────────────────
  - angle_id: "A17"
    angle_name: "Multi-Fungsi / Value Proposition"
    benefit_ref: "MULTI"
    target_segment: "Pengguna value-conscious, keluarga, budget-savvy"
    hook: "Kalau nak beli ubat sakit kepala, ubat kembung, ubat gatal, ubat mual berasingan — berapa dah habis? Ini satu untuk semua."
    usp_1: "14 kegunaan dalam satu botol 30ML — jimat ruang, jimat duit, jimat masa"
